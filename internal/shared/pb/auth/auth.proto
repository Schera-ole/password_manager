syntax = "proto3";
package auth;
option go_package = "github.com/Schera-ole/password_manager/internal/shared/pb/auth";

service AuthService {
    // Register new user
    rpc Register(RegisterRequest) returns (RegisterResponse);
    // Login user
    rpc Login(LoginRequest) returns (LoginResponse);
    // Logout from device
    rpc Logout(LogoutRequest) returns (LogoutResponse);
}

message RegisterRequest {
    string email = 1;
    // password_hash = base64(salt_pwd)$base64(hash)
    string password_hash = 2;
}

message RegisterResponse {}

message LoginRequest {
    string email = 1;
    string password = 2;
    string device_id = 3;  // Client-provided unique device identifier
}

message LoginResponse {
    string access_token = 1;
    string enc_salt = 2;
}

message LogoutRequest {
    string device_id = 1;  // Device identifier to logout from
}

message LogoutResponse {}
