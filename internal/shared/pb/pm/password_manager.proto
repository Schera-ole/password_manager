syntax = "proto3";

package pswmanager;

option go_package = "github.com/Schera-ole/password_manager/internal/shared/pb/pm";

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

service PasswordManagerService {
    // Sync data -> send and get updates
    rpc Sync(SyncRequest) returns (SyncResponse);
    // Get all user records
    rpc ListEntries(ListEntriesRequest) returns (ListEntriesResponse);
    // Get single entry by ID
    rpc GetEntry(GetEntryRequest) returns (GetEntryResponse);
    // Create new record
    rpc CreateEntry(CreateEntryRequest) returns (CreateEntryResponse);
    // Update existed record
    rpc UpdateEntry(UpdateEntryRequest) returns (UpdateEntryResponse);
    // Delete record
    rpc DeleteEntry(DeleteEntryRequest) returns (DeleteEntryResponse);
}

message ListEntriesRequest {
  repeated string tags = 1; // filter by tags
}

message ListEntriesResponse {
  repeated Entry entries = 1;
  int32 total_count = 2;
}

message CreateEntryRequest { Entry entry = 1; }
message CreateEntryResponse { Entry entry = 1; }

message UpdateEntryRequest { Entry entry = 1; }
message UpdateEntryResponse { Entry entry = 1; }

message DeleteEntryRequest { string entry_id = 1; }
message DeleteEntryResponse {}

message GetEntryRequest { string entry_id = 1; }
message GetEntryResponse { Entry entry = 1; }

message SyncRequest {
    google.protobuf.Timestamp since = 1;
}

message SyncResponse {
    repeated Entry entries = 1;
    google.protobuf.Timestamp last_sync = 2;
    bool read_only = 3;
    int32 total_count = 4;
}

message Entry {
  string id = 1;              // UUID, generated by client
  string user_id = 2;         // User email (unique identifier)
  string title = 3;           // Entry title/name
  string description = 4;     // Entry description
  repeated string tags = 5;   // Tags for filtering
  
  enum EntryType {
    ENTRY_TYPE_UNSPECIFIED = 0;
    ENTRY_TYPE_LOGIN = 1;
    ENTRY_TYPE_TEXT = 2;
    ENTRY_TYPE_BINARY = 3;
    ENTRY_TYPE_CARD = 4;
  }
  EntryType entry_type = 6;   // Data type
  google.protobuf.Struct meta = 7;  // Arbitrary key-value metadata
  bytes encrypted_blob = 8;   // Encrypted data (includes IV)
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
  optional google.protobuf.Timestamp expires_at = 11;
  uint32 version = 12;        // For synchronization
}

